project:
  name: quant-gold-report
  tagline: Research workflow for gold factor exposure, regime analysis, and signal review
  research_question: Gold's time-varying sensitivity to the dollar and real yields, with trend performance compared across volatility regimes.

asset:
  default_symbol: GLD
  supported_symbols: [GLD, GC=F, Au99.99]
  comparison_symbols: [GC=F, Au99.99]
  tradable_benchmark_symbol: GLD
  optional_fx_symbol: CNY=X
  shanghai_symbol: Au99.99
  roles:
    GLD: Tradable ETF benchmark and default primary asset
    GC=F: COMEX futures comparison
    Au99.99: Shanghai gold comparison

macro_symbols:
  dxy: DX-Y.NYB
  dgs10: DGS10
  cpi: CPIAUCSL
  dfii10: DFII10
  cny: DEXCHUS
  asof_mode: release_lag

date_range:
  start: 2016-01-01
  end: null

windows:
  sma: [20, 50, 200]
  ema: [20, 50]
  momentum: [21, 63, 126]
  vol: 21
  vol_rank: 252
  corr: 63
  walk_forward_refit: 252
  walk_forward_candidates:
    - [20, 100]
    - [20, 150]
    - [20, 200]
    - [50, 150]
    - [50, 200]

backtest:
  risk_free_rate: 0.0
  transaction_cost_bps: 5.0

optional_features:
  hmm: true
  shanghai_premium: true
  llm_fallback: true

llm:
  provider: anthropic
  model: claude-sonnet-4-20250514
  api_key_env: ANTHROPIC_API_KEY
  temperature: 0.1
  max_tokens: 900

charts:
  theme: plotly_white

gui:
  host: 127.0.0.1
  port: 8050
  default_tab: Overview
  title: Gold Research Terminal

output:
  raw_dir: data/raw
  processed_dir: data/processed
  charts_dir: output/charts
  reports_dir: output/reports

report:
  title: Gold Research Note
  subtitle: Factor Exposure, Regime Behavior, and Signal Review
  author: Jerome Yuxuan Zhang

